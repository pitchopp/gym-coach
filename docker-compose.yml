# Déploiement Dokploy. Le volume nommé conserve la base SQLite entre les redéploiements.
services:
  coach:
    build: .
    restart: unless-stopped
    environment:
      # Auth Claude par OAuth abonnement (pas de clé API). Le fichier de creds est persisté
      # sur le volume ; CLAUDE_OAUTH_JSON ne sert qu'au seed initial (si le fichier est absent).
      OAUTH_CREDS_PATH: ${OAUTH_CREDS_PATH:-/data/claude_oauth.json}
      CLAUDE_OAUTH_JSON: ${CLAUDE_OAUTH_JSON}
      MODEL: ${MODEL:-claude-sonnet-4-6}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      PUBLIC_URL: ${PUBLIC_URL}
      DB_PATH: /data/coach.db
      TICK_MINUTES: ${TICK_MINUTES:-15}
      DEFAULT_TZ: ${DEFAULT_TZ:-Europe/Paris}
    volumes:
      - coach_data:/data
    ports:
      - "8000:8000"

volumes:
  coach_data:
